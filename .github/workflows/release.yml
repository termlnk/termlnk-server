name: release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-alpha.*'
      - 'v*.*.*-beta.*'
      - 'v*.*.*-rc.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to rebuild, e.g. v0.2.0'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: termlnk/termlnk-server

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            RELEASE_TAG='${{ inputs.tag }}'
          else
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

          if [[ "$RELEASE_TAG" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi

          echo "release-tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "is-prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ steps.tag.outputs.release-tag }}

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ steps.tag.outputs.release-tag }}"
          REPO="${{ github.repository }}"
          if gh release view "$RELEASE_TAG" --repo "$REPO" &>/dev/null; then
            echo "Release $RELEASE_TAG already exists, skipping creation"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$REPO" \
              --draft \
              --title "Server $RELEASE_TAG" \
              --generate-notes
            echo "Created draft release for $RELEASE_TAG"
          fi

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.release-tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.release-tag }},enable=${{ steps.tag.outputs.is-prerelease == 'false' }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.release-tag }},enable=${{ steps.tag.outputs.is-prerelease == 'false' }}
            type=raw,value=latest,enable=${{ steps.tag.outputs.is-prerelease == 'false' }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
