# docker-compose for termlnk-server self-host
#
# Default behaviour: pulls a prebuilt image from GHCR (no source needed).
# This file contains the base stack (postgres + redis + server) only — server
# is bound to ${SERVER_BIND}:${SERVER_PORT}.
#
# Usage:
#   docker compose --env-file .env -f docker-compose.yml up -d
#     → HTTP-only deploy, server exposed on host.
#
#   docker compose --env-file .env \
#     -f docker-compose.yml -f docker-compose.https.yml up -d
#     → adds Caddy reverse proxy with auto Let's Encrypt.
#       Requires DOMAIN + ACME_EMAIL in .env.
#
# Developers building from source override with docker-compose.build.yml:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-termlnk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-termlnk}
      POSTGRES_DB: ${POSTGRES_DB:-termlnk_server}
    volumes:
      # postgres:18-alpine expects PGDATA to live under /var/lib/postgresql/<major>/docker;
      # mount the parent so pg_upgrade --link can later cross-version operations.
      - postgres-data:/var/lib/postgresql
    expose:
      - '5432'
    ports:
      - '${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: [CMD-SHELL, 'pg_isready -U ${POSTGRES_USER:-termlnk} -d ${POSTGRES_DB:-termlnk_server}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [redis-server, --save, '', --appendonly, 'no']
    volumes:
      - redis-data:/data
    expose:
      - '6379'
    ports:
      - '${REDIS_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: ghcr.io/termlnk/termlnk-server:${TERMLNK_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-termlnk}:${POSTGRES_PASSWORD:-termlnk}@postgres:5432/${POSTGRES_DB:-termlnk_server}
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?must set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?must set in .env}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      ALLOW_OPEN_REGISTRATION: ${ALLOW_OPEN_REGISTRATION:-true}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      # Google OAuth (optional). The server treats empty values as unset, so the
      # blank defaults below are safe when disabled. To enable: set
      # GOOGLE_OAUTH_ENABLED=true plus client id / secret / redirect URI in .env.
      GOOGLE_OAUTH_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_DESKTOP_CALLBACK_URL: ${GOOGLE_DESKTOP_CALLBACK_URL:-termlnk://auth/callback}
      RELAY_CLAIM_TOKEN_TTL_SECONDS: ${RELAY_CLAIM_TOKEN_TTL_SECONDS:-300}
      # Admin dashboard (optional). Set ADMIN_JWT_SECRET to enable; leave blank
      # to disable. The seed admin is auto-created on first boot when admin_users
      # is empty. To enable: set a 32+ char secret, email and password, then
      # ./deploy.sh restart.
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
      ADMIN_JWT_TTL_SECONDS: ${ADMIN_JWT_TTL_SECONDS:-3600}
    expose:
      - '4000'
    ports:
      # SERVER_BIND defaults to 0.0.0.0 (HTTP-only deployments). install.sh sets it to
      # 127.0.0.1 when Caddy is in front so port 4000 is unreachable from the public net.
      - '${SERVER_BIND:-0.0.0.0}:${SERVER_PORT:-4000}:4000'
    healthcheck:
      test: [CMD, wget, -qO-, 'http://localhost:4000/health']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:
